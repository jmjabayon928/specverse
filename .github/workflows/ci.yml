name: Public CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    env:
      HOST_ENVIRONMENT: render
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard - forbid tracked .env files
        shell: bash
        run: |
          set -euo pipefail
          tracked="$(git ls-files | grep -E '(^|/)\.env($|\.)' || true)"
          if [ -n "$tracked" ]; then
            forbidden="$(echo "$tracked" | grep -v '\.env\.example$' || true)"
            if [ -n "$forbidden" ]; then
              echo "::error::Forbidden: the following .env files are tracked by git (use runtime env and .env.example only):"
              echo "$forbidden"
              exit 1
            fi
          fi

      - name: Guard - obvious secret patterns
        shell: bash
        run: |
          set -euo pipefail

          if git grep -n "BEGIN PRIVATE KEY" -- . ':!/.github/*' >/dev/null 2>&1; then
            echo "::error::Forbidden private key material found in repository."
            exit 1
          fi

          check_var_placeholder() {
            local name="$1"
            local placeholder="$2"
            local matches

            matches="$(git grep -n -E "^${name}=" -- . ':!:docs/*' ':!*.env.example' ':!/.github/workflows/*' || true)"
            if [ -z "$matches" ]; then
              return 0
            fi

            if echo "$matches" | grep -v "${name}=${placeholder}" >/dev/null 2>&1; then
              echo "::error::Suspicious ${name} value found (non-placeholder)."
              echo "$matches"
              exit 1
            fi
          }

          check_var_placeholder_if_present() {
            local name="$1"
            local placeholder="$2"
            local matches

            matches="$(git grep -n "${name}=" -- . ':!:docs/*' ':!*.env.example' || true)"
            if [ -z "$matches" ]; then
              return 0
            fi

            if echo "$matches" | grep -v "${name}=${placeholder}" >/dev/null 2>&1; then
              echo "::error::Suspicious ${name} value found (non-placeholder)."
              echo "$matches"
              exit 1
            fi
          }

          check_var_placeholder "DB_PASSWORD" "CHANGEME"
          check_var_placeholder_if_present "SESSION_SECRET" "CHANGEME"
          check_var_placeholder_if_present "AUTH_SESSION_SECRET" "CHANGEME"
          check_var_placeholder_if_present "COOKIE_SECRET" "CHANGEME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --runInBand --no-cache

      - name: Guard - architecture regression
        shell: bash
        run: |
          set -euo pipefail

          rg -n "http://127\.0\.0\.1" src && exit 1 || echo "No localhost backend references"
          rg -n "NEXT_PUBLIC_APP_URL" src && exit 1 || echo "No NEXT_PUBLIC_APP_URL usage"
          rg -n "NEXT_PUBLIC_API_BASE_URL" src && exit 1 || echo "No NEXT_PUBLIC_API_BASE_URL usage"
          rg -n --glob "src/app/**/*.{ts,tsx}" "@/backend/database" src && exit 1 || echo "No Next->DB imports"

      - name: Guard - committed .env file
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ".env" ]; then
            echo "::error::.env file committed — forbidden"
            exit 1
          fi
          echo "No committed .env file"

      - name: Build
        run: npm run build

      - name: Guard - V0001 is immutable
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Comparing $BASE_SHA -> $HEAD_SHA"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "^db/migrations/sqlserver/V0001__initial_schema\.sql$"; then
            echo "::error::V0001__initial_schema.sql is immutable. Create a new V0002+ migration instead."
            exit 1
          fi

          echo "OK: V0001 unchanged."