name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard - forbid committed env files
        shell: bash
        run: |
          set -euo pipefail
          forbidden_files=""

          # Explicit well-known env filenames
          for f in .env .env.local .env.production .env.development .env.staging .env.test; do
            if [ -f "$f" ]; then
              forbidden_files="$forbidden_files $f"
            fi
          done

          # Any other .env.* files except .env.example
          extra_env="$(ls -1 .env.* 2>/dev/null | grep -v '^\.env\.example$' || true)"
          if [ -n "$extra_env" ]; then
            forbidden_files="$forbidden_files $extra_env"
          fi

          if [ -n "${forbidden_files// /}" ]; then
            echo "Forbidden env file(s) committed:"
            echo "$forbidden_files"
            echo "Use runtime env and .env.example only."
            exit 1
          fi

      - name: Guard - obvious secret patterns
        shell: bash
        run: |
          set -euo pipefail

          # Private keys should never be committed (exclude workflow files to avoid self-match)
          if git grep -n "BEGIN PRIVATE KEY" -- . ':!/.github/*' >/dev/null 2>&1; then
            echo "Forbidden private key material found in repository."
            exit 1
          fi

          # Helper: fail if a variable is present in tracked files with a non-placeholder value.
          # Excludes docs/** and *.env.example.
          check_var_placeholder() {
            local name="$1"
            local placeholder="$2"
            local matches

            matches="$(git grep -n "${name}=" -- . ':!:docs/*' ':!*.env.example' || true)"
            if [ -z "$matches" ]; then
              return 0
            fi

            if echo "$matches" | grep -v "${name}=${placeholder}" >/dev/null 2>&1; then
              echo "Suspicious ${name} value found (non-placeholder)."
              echo "$matches"
              exit 1
            fi
          }

          # Helper: same as above, but ONLY enforces if the var appears at all.
          # (Useful during transitions when not all env names are standardized.)
          check_var_placeholder_if_present() {
            local name="$1"
            local placeholder="$2"
            local matches

            matches="$(git grep -n "${name}=" -- . ':!:docs/*' ':!*.env.example' || true)"
            if [ -z "$matches" ]; then
              return 0
            fi

            if echo "$matches" | grep -v "${name}=${placeholder}" >/dev/null 2>&1; then
              echo "Suspicious ${name} value found (non-placeholder)."
              echo "$matches"
              exit 1
            fi
          }

          # DB secrets should never be real in tracked files
          check_var_placeholder "DB_PASSWORD" "CHANGEME"

          # You moved from JWT to server-side sessions.
          # If any of these exist in tracked files, they MUST be placeholders.
          check_var_placeholder_if_present "SESSION_SECRET" "CHANGEME"
          check_var_placeholder_if_present "AUTH_SESSION_SECRET" "CHANGEME"
          check_var_placeholder_if_present "COOKIE_SECRET" "CHANGEME"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --runInBand --no-cache

      - name: Build
        run: npm run build

      - name: Guard - V0001 is immutable
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Comparing $BASE_SHA -> $HEAD_SHA"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "^db/migrations/sqlserver/V0001__initial_schema\.sql$"; then
            echo "ERROR: V0001__initial_schema.sql is immutable. Create a new V0002+ migration instead."
            exit 1
          fi

          echo "OK: V0001 unchanged."

  deploy-stage:
    name: Deploy to VPS (staging)
    runs-on: ubuntu-latest
    needs: [test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - name: SSH deploy (staging)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 60m
          script_stop: true
          script: |
            set -euo pipefail
            /home/jeff/apps/deploy/deploy-stage.sh staging

  deploy-prod:
    name: Deploy to VPS (production)
    runs-on: ubuntu-latest
    needs: [test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PROD_DEPLOY == 'true'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: SSH deploy (production)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 60m
          script_stop: true
          script: |
            set -euo pipefail
            /home/jeff/apps/deploy/deploy-prod.sh main